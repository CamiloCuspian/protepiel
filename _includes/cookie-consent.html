<!-- Banner de cookies -->
<div id="cookie-consent" class="cookie-consent" role="dialog" aria-modal="true" aria-label="Aviso de cookies" style="display:none;">
  <p class="cookie-consent__text">Usamos cookies para mejorar tu experiencia y analizar el tráfico. <a href="/privacidad/" class="cookie-consent__link">Ver política</a>.</p>
  <div class="cookie-consent__actions">
    <button id="cookie-reject" class="cookie-consent__btn cookie-consent__btn--ghost">Rechazar</button>
    <button id="cookie-accept" class="cookie-consent__btn cookie-consent__btn--solid">Aceptar</button>
  </div>
</div>
